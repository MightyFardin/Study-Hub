name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Create Env File
        run: |
          echo "VITE_FIREBASE_API_KEY=AIzaSyAemNiOsk0-GRkhJPXQfTVzKdIhCvabmtM" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=studyhub-d6422.firebaseapp.com" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=studyhub-d6422" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=studyhub-d6422.firebasestorage.app" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=1018023321139" >> .env
          echo "VITE_FIREBASE_APP_ID=1:1018023321139:web:06165a45635b6f6ef6cd46" >> .env

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk Study-Hub-${{ github.ref_name }}.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: Study-Hub-${{ github.ref_name }}.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
